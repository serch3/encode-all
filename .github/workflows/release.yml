name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            build: npm run build:win -- --publish never
            assets: |
              dist/*.exe
              dist/*.blockmap
              dist/latest.yml
          - platform: macos
            os: macos-latest
            build: npm run build:mac -- --publish never
            assets: |
              dist/*.dmg
              dist/*.zip
              dist/*.blockmap
              dist/latest-mac.yml
          - platform: linux
            os: ubuntu-latest
            build: npm run build:linux -- --publish never
            assets: |
              dist/*.AppImage
              dist/*.deb
              dist/latest-linux.yml

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build distributables
        run: ${{ matrix.build }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: encode-all-${{ matrix.platform }}
          path: ${{ matrix.assets }}
          if-no-files-found: error

  publish:
    name: Publish prerelease
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mapfile -t files < <(find release-assets -type f | sort)
          gh release create "$TAG_NAME" "${files[@]}" --prerelease --generate-notes --title "$TAG_NAME"
